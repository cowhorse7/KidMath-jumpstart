<mat-dialog-content>
  <h2>
    Game Over<button mat-button mat-dialog-close class="close-btn">X</button>
  </h2>

  @if (!data.win) {
    <div><p>You did not reach the goal.</p></div>
  } @else {
    <p>You reached the goal!</p>
  }
  <p>Score: {{ data.score }}</p>
  <p>Time: {{ data.time }}</p>
</mat-dialog-content>
