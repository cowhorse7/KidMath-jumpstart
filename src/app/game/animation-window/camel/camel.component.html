      cx="130"
      cy="22"

      fill="#fff"
      style="animation-delay: 0.4s"
    />
    <circle
      class="star"
      cx="200"
      cy="8"
      r="1.5"
      fill="#fff"

          <stop offset="0%" stop-color="#e8a55a" />

        <linearGradient id="dune2" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#d4934a" />
          <stop offset="100%" stop-color="#b06828" />
        </linearGradient>
      </defs>
      <rect x="0" y="150" width="680" height="80" fill="#c47a30" />
      <ellipse cx="120" cy="158" rx="160" ry="28" fill="url(#dune1)" />
      <ellipse cx="400" cy="162" rx="200" ry="24" fill="url(#dune2)" />
      <ellipse cx="640" cy="160" rx="140" ry="22" fill="url(#dune1)" />
      <ellipse
        cx="220"
        cy="142"
        rx="100"
        ry="15"
        fill="#c97e3a"
        opacity="0.5"
      />
      <!-- Single sun in first panel only -->
      <circle cx="540" cy="55" r="28" fill="#ffd060" opacity="0.9" />
      <circle cx="540" cy="55" r="22" fill="#ffb830" />
      <rect x="60" y="138" width="6" height="20" rx="3" fill="#5a8a30" />

      <rect x="474" y="143" width="14" height="4" rx="2" fill="#5a8a30" />
    </svg>
    <svg
      width="50%"
      height="100%"
      viewBox="0 0 680 230"
      preserveAspectRatio="none"
      style="display: block"
    >
      <defs>
        <linearGradient id="dune1b" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#e8a55a" />
          <stop offset="100%" stop-color="#c47a30" />
        </linearGradient>
        <linearGradient id="dune2b" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#d4934a" />
          <stop offset="100%" stop-color="#b06828" />
        </linearGradient>
      </defs>
      <rect x="0" y="150" width="680" height="80" fill="#c47a30" />
      <ellipse cx="120" cy="158" rx="160" ry="28" fill="url(#dune1b)" />
      <ellipse cx="400" cy="162" rx="200" ry="24" fill="url(#dune2b)" />
      <ellipse cx="640" cy="160" rx="140" ry="22" fill="url(#dune1b)" />
      <ellipse
        cx="220"
        cy="142"
        rx="100"
        ry="15"
        fill="#c97e3a"
        opacity="0.5"

      left: 0;
      right: 0;

<div
  style="
    display: flex;
    align-items: center;
    gap: 12px;
    margin-top: 10px;
    font-size: 13px;
    flex-wrap: wrap;
  "
>
  <span style="white-space: nowrap"
    >Steps: <strong>{{ steps }} / 10</strong></span
  >
  <div class="progress-bar-wrap">
    <div class="progress-bar" [style.width.%]="(steps / 10) * 100"></div>
  </div>
</div>
