@if (!session) {
  <div class="userbox">
    <h1>Log in to track your stats!</h1>
    <form (ngSubmit)="login()" #formLogin="ngForm">
      <label for="email">Email</label>
      <input
        type="text"
        class="email"
        name="email"
        required
        [(ngModel)]="email"
        />
      <button type="submit" [disabled]="formLogin.invalid">Go!</button>
    </form>
  </div>
} @else {
  <div>
    @if (!editMode) {
      <div>
        <h1>
          Hello, {{ username }}!<button mat-icon-button>
          <mat-icon>edit</mat-icon>
        </button>
      </h1>
    </div>
  }
  @if (editMode) {
    <form
      [formGroup]="usernameForm"
      (ngSubmit)="submitUsername()"
      >
      <mat-form-field appearance="outline">
        <mat-label>Username</mat-label>
        <input matInput formControlName="username" required />
        @if (usernameForm.get('username')?.hasError('required')) {
          <mat-error>
            Username is required
          </mat-error>
        }
        @if (updateError) {
          <mat-error>{{ updateError }}</mat-error>
        }
      </mat-form-field>
      <button
        mat-raised-button
        color="primary"
        type="submit"
        [disabled]="usernameForm.invalid || isSubmitting"
        >
        Save
      </button>
      <button
        mat-button
        type="button"
        (click)="cancelEdit()"
        [disabled]="isSubmitting"
        >
        Cancel
      </button>
    </form>
  }
  <div class="award-box">
    <div class="award"></div>
    <div class="award"></div>
    <div class="award"></div>
    <div class="award"></div>
    <div class="award"></div>
  </div>
  <button (click)="logout()">Log out</button>
</div>
}
